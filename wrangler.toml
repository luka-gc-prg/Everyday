name = "everyday-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespace - erstelle mit: wrangler kv namespace create EVERYDAY
[[kv_namespaces]]
binding = "EVERYDAY"
id = "DEINE_KV_NAMESPACE_ID_HIER"  # ← ersetze mit deiner echten ID

# Secret für Token-Signierung - setze mit:
# wrangler secret put TOKEN_SECRET
# (dann einen langen zufälligen String eingeben)
