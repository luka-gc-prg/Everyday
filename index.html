<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday — Geschützter Bereich</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a0a0a;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:#ece9e2;padding:24px;position:relative;overflow:hidden;
  }
  body::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(200,169,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
  .box{width:100%;max-width:360px;text-align:center;position:relative;z-index:1}
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:34px}
  .clockicon{width:34px;height:34px;border-radius:50%;border:1.6px solid #c8a96e;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
  .clockicon::before{content:"";position:absolute;width:1.4px;height:9px;background:#c8a96e;top:6px;left:50%;transform:translateX(-50%) rotate(0deg);transform-origin:bottom center;border-radius:1px}
  .clockicon::after{content:"";position:absolute;width:1.4px;height:7px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:1px}
  .brand-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;color:#f5f2ed}
  .lock-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8a744a;margin-bottom:30px}
  input[type=password]{
    width:100%;padding:14px 16px;border-radius:10px;border:1px solid #2a2a2a;
    background:#15140f;color:#ece9e2;font-size:15px;margin-bottom:14px;
    outline:none;transition:.15s;font-family:'DM Sans',sans-serif;
  }
  input[type=password]:focus{border-color:#c8a96e}
  button{
    width:100%;padding:14px;border-radius:10px;border:none;
    background:#c8a96e;color:#1a1408;font-size:14px;font-weight:500;
    cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;
  }
  button:hover{background:#d8b97a}
  button:disabled{opacity:.5;cursor:default}
  .err{color:#c47b6e;font-size:12.5px;margin-top:14px;min-height:16px}
  .timeoutMsg{color:#7aa6d6;font-size:12.5px;margin-top:14px;min-height:16px}
  label.remember{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:16px;font-size:12.5px;color:#7c7a73;cursor:pointer}
  label.remember input{accent-color:#c8a96e;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="brand">
    <div class="clockicon"></div>
    <span class="brand-name">EVERYDAY</span>
  </div>
  <p class="lock-sub">Geschützter Bereich</p>
  <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password" autofocus>
  <button id="go">Entsperren</button>
  <label class="remember"><input type="checkbox" id="remember" checked> Angemeldet bleiben (15 Min. Inaktivität)</label>
  <div class="err" id="err"></div>
  <div class="timeoutMsg" id="timeoutMsg"></div>
</div>

const SALT_HEX = "2bb880cd975f2d26";
const IV_HEX = "f08b1006c14c9dff52c8b69b9d417598";
const STORAGE_KEY = "lg_protected_pw";
const EXPIRY_KEY = "lg_protected_exp";
const TIMEOUT_MS = 15 * 60 * 1000;

function hexToBytes(hex) { const b=new Uint8Array(hex.length/2); for(let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.substr(i,2),16); return b; }
function b64ToBytes(b64) { const bin=atob(b64); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
async function deriveKey(password, saltBytes) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:saltBytes, iterations:600000, hash:"SHA-256"}, km, {name:"AES-CBC", length:256}, false, ["decrypt"]);
}
async function tryDecrypt(password) {
  const key = await deriveKey(password, hexToBytes(SALT_HEX));
  const dec = await crypto.subtle.decrypt({name:"AES-CBC", iv:hexToBytes(IV_HEX)}, key, b64ToBytes(ENC_B64));
  return new TextDecoder().decode(dec);
}

function refreshExpiry() {
  try { localStorage.setItem(EXPIRY_KEY, String(Date.now() + TIMEOUT_MS)); } catch(e) {}
}
function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(EXPIRY_KEY); } catch(e) {}
}
function isSessionExpired() {
  let exp = null;
  try { exp = localStorage.getItem(EXPIRY_KEY); } catch(e) { return true; }
  if (!exp) return true;
  return Date.now() > Number(exp);
}

function startActivityWatcher() {
  refreshExpiry();
  const events = ["mousedown","mousemove","keydown","scroll","touchstart","click"];
  let throttle = false;
  const onActivity = () => {
    if (throttle) return;
    throttle = true;
    setTimeout(() => { throttle = false; }, 5000);
    refreshExpiry();
  };
  events.forEach(ev => document.addEventListener(ev, onActivity, {passive:true}));
  setInterval(() => {
    if (isSessionExpired()) {
      clearSession();
      location.reload();
    }
  }, 10000);
}

async function attempt(password) {
  const errEl = document.getElementById("err"), btn = document.getElementById("go");
  btn.disabled = true; btn.textContent = "Wird geprüft …"; errEl.textContent = "";
  try {
    const html = await tryDecrypt(password);
    if (document.getElementById("remember").checked) {
      try { localStorage.setItem(STORAGE_KEY, password); } catch(e) {}
      refreshExpiry();
    } else {
      clearSession();
    }
    document.open(); document.write(html); document.close();
    startActivityWatcher();
  } catch (e) {
    errEl.textContent = "Falsches Passwort. Bitte erneut versuchen.";
    btn.disabled = false; btn.textContent = "Entsperren";
  }
}

document.getElementById("go").addEventListener("click", () => { const pw = document.getElementById("pw").value; if (pw) attempt(pw); });
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("go").click(); });

(function() {
  if (location.hash === "#logout") {
    clearSession();
    history.replaceState(null, "", location.pathname);
    return;
  }
  let hadSaved = false;
  try { hadSaved = !!localStorage.getItem(STORAGE_KEY); } catch(e) {}
  if (isSessionExpired()) {
    clearSession();
    if (hadSaved) {
      const msgEl = document.getElementById("timeoutMsg");
      if (msgEl) msgEl.textContent = "Sitzung wegen Inaktivität beendet — bitte erneut anmelden.";
    }
    return;
  }
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) attempt(saved);
  } catch(e) {}
})();
