<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Everyday</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0a0a0a;color:#ece9e2;position:relative;
  }
  body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(200,169,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse 900px 600px at 12% -8%, rgba(200,169,110,.16), transparent 60%),
      radial-gradient(ellipse 800px 700px at 100% 18%, rgba(200,169,110,.08), transparent 65%),
      radial-gradient(ellipse 700px 600px at 50% 100%, rgba(200,169,110,.06), transparent 60%);
  }

  /* ===== LOCKSCREEN ===== */
  #lockscreen{
    position:fixed;inset:0;z-index:1000;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:14vh 24px 8vh;
    touch-action:none;user-select:none;
    transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease;
  }
  #lockscreen.unlocked{transform:translateY(-100%);opacity:0;pointer-events:none}

  .lock-top{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:6vh}
  .lock-date{font-size:12.5px;letter-spacing:.14em;color:#8a8078;text-transform:uppercase}

  .lock-middle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}

  /* ---- Slide-to-unlock Track (altes iPhone Feeling) ---- */
  .lock-slide-track{
    position:relative;
    width:min(88vw,320px);
    height:72px;
    border-radius:999px;
    background:linear-gradient(180deg,rgba(20,18,16,.55),rgba(8,7,6,.55));
    border:1px solid rgba(200,169,110,.22);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), inset 0 -1px 10px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.3);
    display:flex;align-items:center;padding:5px;
    overflow:hidden;
  }
  .lock-slide-label{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding-left:62px;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    background:linear-gradient(90deg,#6b6258 0%,#6b6258 35%,#f5f2ed 50%,#6b6258 65%,#6b6258 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:slideShimmer 2.8s linear infinite;
    transition:opacity .15s;
    pointer-events:none;
    white-space:nowrap;
  }
  .lock-slide-arrows{
    display:inline-flex;color:#c8a96e;-webkit-text-fill-color:#c8a96e;
    font-size:13px;letter-spacing:0;animation:arrowPulse 1.4s ease-in-out infinite;
  }
  @keyframes slideShimmer{0%{background-position:200% 0}100%{background-position:-50% 0}}
  @keyframes arrowPulse{0%,100%{transform:translateX(0);opacity:.6}50%{transform:translateX(4px);opacity:1}}

  .lock-logo-wrap{
    position:relative;z-index:2;
    cursor:grab;touch-action:none;
    display:flex;align-items:center;
  }
  .lock-logo-wrap.snap{transition:transform .35s cubic-bezier(.22,1,.36,1)}
  .lock-logo-wrap:active{cursor:grabbing}
  .lock-logo-badge{
    position:relative;
    height:62px;
    padding:0 28px 0 14px;
    border-radius:50px;
    background:linear-gradient(180deg,#141210,#0a0908);
    border:1.5px solid #c8a96e;
    box-shadow:0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
    display:flex;align-items:center;gap:12px;
  }
  .lock-logo-clock{
    width:38px;height:38px;border-radius:50%;border:2px solid #c8a96e;
    display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;
  }
  .lock-logo-clock::before{content:"";position:absolute;width:1.6px;height:11px;background:#c8a96e;top:6px;left:50%;transform:translateX(-50%);transform-origin:bottom center;border-radius:2px;animation:lockHourHand 8s linear infinite}
  .lock-logo-clock::after{content:"";position:absolute;width:1.6px;height:8px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:2px;animation:lockMinHand 4s linear infinite}
  @keyframes lockHourHand{0%{transform:translateX(-50%) rotate(0deg)}100%{transform:translateX(-50%) rotate(360deg)}}
  @keyframes lockMinHand{0%{transform:translateX(-50%) translateY(-100%) rotate(55deg)}100%{transform:translateX(-50%) translateY(-100%) rotate(415deg)}}
  .lock-logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.08em;color:#f5f2ed;line-height:1}

  .lock-status{font-size:12px;letter-spacing:.08em;color:#7c7a73;text-align:center;min-height:18px;transition:opacity .2s}
  .lock-bottom{min-height:18px}

  /* ===== LOGIN ===== */
  #loginScreen{
    position:fixed;inset:0;z-index:900;
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;pointer-events:none;transition:opacity .35s ease;

  }
  #loginScreen.show{opacity:1;pointer-events:auto}
  .login-box{width:100%;max-width:340px;text-align:center}
  .login-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:30px}
  .login-clockicon{width:30px;height:30px;border-radius:50%;border:1.6px solid #c8a96e;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
  .login-clockicon::before{content:"";position:absolute;width:1.4px;height:8px;background:#c8a96e;top:5px;left:50%;transform:translateX(-50%);transform-origin:bottom center;border-radius:1px}
  .login-clockicon::after{content:"";position:absolute;width:1.4px;height:6px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:1px}
  .login-brand-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.04em;color:#f5f2ed}
  .login-sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a744a;margin-bottom:26px}
  #loginScreen input[type=password]{
    width:100%;padding:14px 16px;border-radius:10px;border:1px solid #2a2a2a;
    background:#15140f;color:#ece9e2;font-size:15px;margin-bottom:14px;outline:none;
    transition:.15s;font-family:'DM Sans',sans-serif;
  }
  #loginScreen input[type=password]:focus{border-color:#c8a96e}
  #loginScreen button{
    width:100%;padding:14px;border-radius:10px;border:none;
    background:#c8a96e;color:#1a1408;font-size:14px;font-weight:500;
    cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;
  }
  #loginScreen button:hover{background:#d8b97a}
  #loginScreen button:disabled{opacity:.5;cursor:default}
  .login-err{color:#c47b6e;font-size:12.5px;margin-top:14px;min-height:16px}
  .login-timeout{color:#7aa6d6;font-size:12.5px;margin-top:14px;min-height:16px}
  .login-back{background:none;border:none;color:#7c7a73;font-size:11.5px;letter-spacing:.08em;margin-top:18px;cursor:pointer;padding:6px}
  .login-back:hover{color:#ece9e2}
  label.remember{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:16px;font-size:12.5px;color:#7c7a73;cursor:pointer}
  label.remember input{accent-color:#c8a96e;cursor:pointer}
</style>
</head>
<body>

<div id="lockscreen">
  <div class="lock-top">
    <div class="lock-date" id="lockDate">—</div>
  </div>
  <div class="lock-middle">
    <div class="lock-slide-track" id="lockTrack">
      <span class="lock-slide-label" id="lockTrackLabel">Nach rechts wischen zum Entsperren <span class="lock-slide-arrows">›››</span></span>
      <div class="lock-logo-wrap" id="lockHandle">
        <div class="lock-logo-badge">
          <div class="lock-logo-clock"></div>
          <span class="lock-logo-text">EVERYDAY</span>
        </div>
      </div>
    </div>
    <div class="lock-status" id="lockStatus"></div>
  </div>
  <div class="lock-bottom"></div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-clockicon"></div>
      <span class="login-brand-name">EVERYDAY</span>
    </div>
    <p class="login-sub">Geschützter Bereich</p>
    <button id="faceIdBtn" style="display:none;margin-bottom:14px;background:transparent;border:1px solid #c8a96e;color:#c8a96e">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:6px"><path d="M9 4h-2a2 2 0 0 0 -2 2v2"/><path d="M4 15v2a2 2 0 0 0 2 2h2"/><path d="M15 20h2a2 2 0 0 0 2 -2v-2"/><path d="M20 9v-2a2 2 0 0 0 -2 -2h-2"/><path d="M9 10v.01"/><path d="M15 10v.01"/><path d="M9.5 15a3.5 3.5 0 0 0 5 0"/></svg>
      Mit Face ID entsperren
    </button>
    <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
    <button id="go">Entsperren</button>
    <label class="remember"><input type="checkbox" id="remember" checked> Angemeldet bleiben (15 Min. Inaktivität)</label>
    <button id="setupFaceIdBtn" style="display:none;margin-top:10px;background:transparent;border:none;color:#7c7a73;font-size:11.5px;letter-spacing:.05em;padding:6px">⊕ Face ID für dieses Gerät einrichten</button>
    <div class="login-err" id="err"></div>
    <div class="login-timeout" id="timeoutMsg"></div>
    <button class="login-back" id="backToLock">← Zurück</button>
  </div>
</div>

const SALT_HEX = "a0ba81d2227061a6";
const IV_HEX = "366d870e05ae7292a1dff20b1dabde26";
const STORAGE_KEY = "lg_protected_pw";
const EXPIRY_KEY = "lg_protected_exp";
const TIMEOUT_MS = 15 * 60 * 1000;

function hexToBytes(hex) { const b=new Uint8Array(hex.length/2); for(let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.substr(i,2),16); return b; }
function b64ToBytes(b64) { const bin=atob(b64); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
async function deriveKey(password, saltBytes) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:saltBytes, iterations:600000, hash:"SHA-256"}, km, {name:"AES-CBC", length:256}, false, ["decrypt"]);
}
async function tryDecrypt(password) {
  const key = await deriveKey(password, hexToBytes(SALT_HEX));
  const dec = await crypto.subtle.decrypt({name:"AES-CBC", iv:hexToBytes(IV_HEX)}, key, b64ToBytes(ENC_B64));
  return new TextDecoder().decode(dec);
}

function refreshExpiry() { try { localStorage.setItem(EXPIRY_KEY, String(Date.now() + TIMEOUT_MS)); } catch(e) {} }
function clearSession() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(EXPIRY_KEY); } catch(e) {} }
function isSessionExpired() {
  let exp = null;
  try { exp = localStorage.getItem(EXPIRY_KEY); } catch(e) { return true; }
  if (!exp) return true;
  return Date.now() > Number(exp);
}
function startActivityWatcher(savedPassword) {
  refreshExpiry();
  const events = ["mousedown","mousemove","keydown","scroll","touchstart","click"];
  let throttle = false;
  let reauthShown = false;
  const onActivity = () => {
    if (throttle || reauthShown) return;
    throttle = true;
    setTimeout(() => { throttle = false; }, 5000);
    refreshExpiry();
  };
  events.forEach(ev => document.addEventListener(ev, onActivity, {passive:true}));

  function showReauthOverlay() {
    if (reauthShown) return;
    reauthShown = true;
    const ov = document.createElement("div");
    ov.id = "reauthOverlay";
    ov.style.cssText = "position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.82);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:24px";
    ov.innerHTML = '<div style="width:100%;max-width:340px;text-align:center">'
      + '<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px">'
      + '<div style="width:30px;height:30px;border-radius:50%;border:1.6px solid #c8a96e;position:relative;flex-shrink:0"><div style="position:absolute;width:1.4px;height:8px;background:#c8a96e;top:5px;left:50%;transform:translateX(-50%);transform-origin:bottom center;border-radius:1px"></div><div style="position:absolute;width:1.4px;height:6px;background:#c8a96e;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%) rotate(55deg);border-radius:1px"></div></div>'
      + '<span style="font-family:Bebas Neue,sans-serif;font-size:19px;letter-spacing:.04em;color:#f5f2ed">EVERYDAY</span></div>'
      + '<p style="font-size:12px;color:#9fb0c0;margin-bottom:20px">Sitzung abgelaufen — Passwort eingeben um weiterzumachen</p>'
      + '<input type="password" id="reauthPw" placeholder="Passwort" autocomplete="current-password" style="width:100%;padding:14px 16px;border-radius:10px;border:1px solid #2a2a2a;background:#15140f;color:#ece9e2;font-size:15px;margin-bottom:12px;outline:none;font-family:DM Sans,sans-serif">'
      + '<button id="reauthGo" style="width:100%;padding:14px;border-radius:10px;border:none;background:#c8a96e;color:#1a1408;font-size:14px;font-weight:500;cursor:pointer;font-family:DM Sans,sans-serif;margin-bottom:10px">Weiter</button>'
      + '<button id="reauthLogout" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a2a2a;background:transparent;color:#7c7a73;font-size:12px;cursor:pointer;font-family:DM Sans,sans-serif">Komplett abmelden</button>'
      + '<div id="reauthErr" style="color:#c47b6e;font-size:12.5px;margin-top:12px;min-height:16px"></div>'
      + '</div>';
    document.body.appendChild(ov);
    const pwIn = document.getElementById("reauthPw");
    const errEl = document.getElementById("reauthErr");
    setTimeout(() => pwIn.focus(), 100);
    function doReauth() {
      if (pwIn.value === savedPassword) {
        reauthShown = false;
        refreshExpiry();
        try { localStorage.setItem(STORAGE_KEY, savedPassword); } catch(e) {}
        ov.remove();
      } else {
        errEl.textContent = "Falsches Passwort.";
        pwIn.value = "";
        pwIn.focus();
      }
    }
    document.getElementById("reauthGo").addEventListener("click", doReauth);
    pwIn.addEventListener("keydown", e => { if (e.key === "Enter") doReauth(); });
    document.getElementById("reauthLogout").addEventListener("click", () => {
      clearSession();
      location.reload();
    });
  }

  setInterval(() => {
    if (isSessionExpired() && !reauthShown) showReauthOverlay();
  }, 10000);

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
      try { localStorage.setItem(EXPIRY_KEY, String(Date.now() + 10 * 60 * 1000)); } catch(e) {}
    } else if (document.visibilityState === "visible") {
      if (isSessionExpired() && !reauthShown) showReauthOverlay();
      else if (!reauthShown) refreshExpiry();
    }
  });
  window.addEventListener("pagehide", () => {
    try { localStorage.setItem(EXPIRY_KEY, String(Date.now() + 10 * 60 * 1000)); } catch(e) {}
  });
}

/* ---------- Face ID / Touch ID (vereinfacht, lokal) ---------- */
const FACEID_FLAG_KEY = "lg_faceid_registered";
const FACEID_CREDID_KEY = "lg_faceid_credid";
const RP_ID = location.hostname;

function faceIdSupported() {
  return !!(window.PublicKeyCredential && navigator.credentials);
}
function randomChallenge() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return arr;
}
function strToBytes(str) {
  return new TextEncoder().encode(str);
}

async function registerFaceId() {
  if (!faceIdSupported()) { alert("Face ID / Touch ID wird auf diesem Gerät nicht unterstützt."); return; }
  try {
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: randomChallenge(),
        rp: { name: "Everyday", id: RP_ID },
        user: { id: strToBytes("everyday-user"), name: "Everyday", displayName: "Everyday" },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000,
        attestation: "none"
      }
    });
    if (cred) {
      try {
        localStorage.setItem(FACEID_FLAG_KEY, "1");
        localStorage.setItem(FACEID_CREDID_KEY, cred.id);
      } catch(e) {}
      updateFaceIdUI();
      alert("Face ID ist jetzt für dieses Gerät eingerichtet.");
    }
  } catch (e) {
    alert("Face ID konnte nicht eingerichtet werden.");
  }
}

async function unlockWithFaceId() {
  if (!faceIdSupported()) return;
  let credId = null;
  try { credId = localStorage.getItem(FACEID_CREDID_KEY); } catch(e) {}
  if (!credId) return;
  try {
    const idBytes = Uint8Array.from(atob(credId.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0));
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge: randomChallenge(),
        allowCredentials: [{ type: "public-key", id: idBytes }],
        userVerification: "required",
        timeout: 60000,
        rpId: RP_ID
      }
    });
    if (assertion) {
      let savedPw = null;
      try { savedPw = localStorage.getItem(STORAGE_KEY); } catch(e) {}
      if (savedPw) {
        attemptUnlock(savedPw);
      } else {
        document.getElementById("err").textContent = "Kein gespeichertes Passwort gefunden. Bitte einmal mit Passwort entsperren.";
      }
    }
  } catch (e) {}
}

function updateFaceIdUI() {
  let registered = false, hasSaved = false;
  try {
    registered = localStorage.getItem(FACEID_FLAG_KEY) === "1";
    hasSaved = !!localStorage.getItem(STORAGE_KEY);
  } catch(e) {}
  const faceBtn = document.getElementById("faceIdBtn");
  const setupBtn = document.getElementById("setupFaceIdBtn");
  if (faceIdSupported() && registered && hasSaved) {
    faceBtn.style.display = "";
  } else {
    faceBtn.style.display = "none";
  }
  if (faceIdSupported() && !registered) {
    setupBtn.style.display = "";
  } else {
    setupBtn.style.display = "none";
  }
}

async function attemptUnlock(password) {
  const errEl = document.getElementById("err");
  const btn = document.getElementById("go");
  btn.disabled = true; btn.textContent = "Wird geprüft …"; errEl.textContent = "";
  try {
    const decrypted = await tryDecrypt(password);
    try { localStorage.setItem(STORAGE_KEY, password); } catch(e) {}
    refreshExpiry();
    let alreadyRegistered = false;
    try { alreadyRegistered = localStorage.getItem(FACEID_FLAG_KEY) === "1"; } catch(e) {}
    if (faceIdSupported() && !alreadyRegistered) {
      try {
        if (confirm("Face ID / Touch ID für schnelleres Entsperren auf diesem Gerät einrichten?")) {
          await registerFaceId();
        }
      } catch(e) {}
    }
    document.open(); document.write(decrypted); document.close();
    startActivityWatcher(password);
  } catch (e) {
    errEl.textContent = "Falsches Passwort. Bitte erneut versuchen.";
    btn.disabled = false; btn.textContent = "Entsperren";
  }
}

function showLogin() {
  document.getElementById("lockscreen").classList.add("unlocked");
  setTimeout(() => {
    document.getElementById("loginScreen").classList.add("show");
    updateFaceIdUI();
    document.getElementById("pw").focus();
  }, 250);
}
function showLock() {
  document.getElementById("loginScreen").classList.remove("show");
  const lock = document.getElementById("lockscreen");
  lock.classList.remove("unlocked");
  resetLogo();
}

document.getElementById("go").addEventListener("click", () => {
  const pw = document.getElementById("pw").value;
  if (pw) attemptUnlock(pw);
});
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("go").click();
});
document.getElementById("backToLock").addEventListener("click", showLock);
document.getElementById("faceIdBtn").addEventListener("click", unlockWithFaceId);
document.getElementById("setupFaceIdBtn").addEventListener("click", registerFaceId);

function setLockDate() {
  const el = document.getElementById("lockDate");
  if (!el) return;
  const now = new Date();
  const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  const months = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  el.textContent = days[now.getDay()] + ", " + now.getDate() + ". " + months[now.getMonth()];
}
setLockDate();

const track = document.getElementById("lockTrack");
const handle = document.getElementById("lockHandle");
const trackLabel = document.getElementById("lockTrackLabel");
const lockscreenEl = document.getElementById("lockscreen");
let dragging = false, startX = 0, maxTravel = 0;

function computeMaxTravel() {
  const trackRect = track.getBoundingClientRect();
  const handleRect = handle.getBoundingClientRect();
  maxTravel = Math.max(0, trackRect.width - handleRect.width - 10);
}

function resetLogo() {
  handle.classList.add("snap");
  handle.style.transform = "translateX(0px)";
  trackLabel.style.opacity = "1";
  setTimeout(() => handle.classList.remove("snap"), 350);
}

function onDragStart(clientX) {
  computeMaxTravel();
  dragging = true;
  startX = clientX;
  handle.classList.remove("snap");
}
function onDragMove(clientX) {
  if (!dragging) return;
  const dx = Math.max(0, clientX - startX);
  const travel = Math.min(dx, maxTravel);
  const progress = maxTravel > 0 ? travel / maxTravel : 0;
  handle.style.transform = "translateX(" + travel + "px)";
  trackLabel.style.opacity = String(1 - progress * 0.9);
  if (progress > 0.92) completeUnlock();
}
function onDragEnd() {
  if (!dragging) return;
  dragging = false;
  if (!lockscreenEl.classList.contains("unlocked")) resetLogo();
}
function completeUnlock() {
  if (lockscreenEl.classList.contains("unlocked")) return;
  dragging = false;
  handle.classList.add("snap");
  handle.style.transform = "translateX(" + maxTravel + "px)";
  trackLabel.style.opacity = "0";
  setTimeout(showLogin, 220);
}

handle.addEventListener("mousedown", e => { onDragStart(e.clientX); e.preventDefault(); });
window.addEventListener("mousemove", e => onDragMove(e.clientX));
window.addEventListener("mouseup", onDragEnd);

handle.addEventListener("touchstart", e => { onDragStart(e.touches[0].clientX); }, {passive:true});
window.addEventListener("touchmove", e => { if (dragging) onDragMove(e.touches[0].clientX); }, {passive:true});
window.addEventListener("touchend", onDragEnd);

window.addEventListener("resize", computeMaxTravel);
computeMaxTravel();

(function() {
  if (location.hash === "#logout") {
    clearSession();
    history.replaceState(null, "", location.pathname);
    return;
  }
  let hadSaved = false;
  try { hadSaved = !!localStorage.getItem(STORAGE_KEY); } catch(e) {}
  if (isSessionExpired()) {
    clearSession();
    if (hadSaved) {
      document.getElementById("lockStatus").textContent = "Sitzung wegen Inaktivität beendet";
    }
    return;
  }
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      document.getElementById("lockStatus").textContent = "Wird automatisch entsperrt …";
      attemptUnlock(saved);
      lockscreenEl.classList.add("unlocked");
    }
  } catch(e) {}
})();
</script>
